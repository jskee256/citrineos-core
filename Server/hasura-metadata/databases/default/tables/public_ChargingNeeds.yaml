table:
  name: ChargingNeeds
  schema: public
object_relationships:
  - name: Evse
    using:
      foreign_key_constraint_on: evseId
  - name: Tenant
    using:
      foreign_key_constraint_on: tenantId
  - name: Transaction
    using:
      foreign_key_constraint_on: transactionDatabaseId
insert_permissions:
  - role: user
    permission:
      check:
        tenantId:
          _eq: x-hasura-tenant-id
      columns:
        - acChargingParameters
        - createdAt
        - dcChargingParameters
        - departureTime
        - evseId
        - id
        - maxScheduleTuples
        - requestedEnergyTransfer
        - transactionDatabaseId
        - updatedAt
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - requestedEnergyTransfer
        - evseId
        - id
        - maxScheduleTuples
        - tenantId
        - transactionDatabaseId
        - acChargingParameters
        - dcChargingParameters
        - createdAt
        - departureTime
        - updatedAt
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - acChargingParameters
        - createdAt
        - dcChargingParameters
        - departureTime
        - evseId
        - id
        - maxScheduleTuples
        - requestedEnergyTransfer
        - transactionDatabaseId
        - updatedAt
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
      check:
        tenantId:
          _eq: x-hasura-tenant-id
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
    comment: ""
